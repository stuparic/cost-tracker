<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6d54e8"/>
      <stop offset="100%" stop-color="#4331b8"/>
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe9a8"/>
      <stop offset="100%" stop-color="#f6c945"/>
    </linearGradient>
    <clipPath id="squircle">
      <rect width="512" height="512" rx="80" ry="80"/>
    </clipPath>
  </defs>

  <g clip-path="url(#squircle)">
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- Sun rays -->
    <g stroke="#ffd75e" stroke-width="20" stroke-linecap="round">
      <path d="M256 96 v-40"/>
      <path d="M140 140 l-28 -28"/>
      <path d="M372 140 l28 -28"/>
      <path d="M100 256 h-40"/>
      <path d="M412 256 h40"/>
    </g>

    <!-- Coin -->
    <circle cx="256" cy="300" r="160" fill="url(#coin)"/>
    <circle cx="256" cy="300" r="122" fill="none" stroke="#d9a92e" stroke-width="10"/>

    <!-- Face -->
    <circle cx="208" cy="276" r="15" fill="#3a2c10"/>
    <circle cx="304" cy="276" r="15" fill="#3a2c10"/>
    <path d="M204 330 q52 52 104 0" fill="none" stroke="#3a2c10" stroke-width="15" stroke-linecap="round"/>
    <path d="M226 336 q30 26 60 0 l-8 14 q-22 16 -44 0 z" fill="#e2704a"/>
    <circle cx="182" cy="318" r="12" fill="#f0966d" opacity="0.65"/>
    <circle cx="330" cy="318" r="12" fill="#f0966d" opacity="0.65"/>

    <!-- Horizon -->
    <rect x="0" y="428" width="512" height="84" fill="#33268c"/>
  </g>
</svg>
